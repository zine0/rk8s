name: slayerfs tests

on:
  pull_request:
    paths:
      - "project/slayerfs/**"
      - "project/rfuse3/**"
      - "project/Cargo.toml"
      - "project/Cargo.lock"
  push:
    branches:
      - main
    paths:
      - "project/slayerfs/**"
      - "project/rfuse3/**"
      - "project/Cargo.toml"
      - "project/Cargo.lock"

jobs:
  unit-and-integration:
    if: false
    name: slayerfs integration test
    runs-on: [self-hosted]
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git-lfs \
            fuse3 \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            qemu-system-x86 \
            qemu-utils \
            libvirt-clients \
            guestfish \
            xorriso

      - name: Start backend services
        run: |
          docker compose -f project/slayerfs/docker/docker-compose.integration.yml up -d

      - name: Run tests
        run: |
          cd project
          cargo build -p slayerfs --example persistence_demo --release
          cargo test -p slayerfs --test test_slayerfs_qlean_multinode_smoke -- --ignored

      - name: Stop backend services
        if: always()
        run: |
          docker compose -f project/slayerfs/docker/docker-compose.integration.yml down -v

      - name: Install nightly toolchain and cargo-fuzz
        run: |
          rustup toolchain install nightly --profile minimal
          cargo install cargo-fuzz --locked --force

      - name: Fuzz explore (fs_ops)
        timeout-minutes: 30
        run: |
          cd project/slayerfs
          cargo +nightly fuzz build fs_ops
          BIN=$(find fuzz/target -type f -path "*/release/fs_ops" | head -n 1)
          echo "Using fuzz binary: ${BIN}"

          # CI clone may not contain local/untracked corpus dirs; create them defensively.
          mkdir -p fuzz/corpus/fs_ops fuzz/artifacts/fs_ops

          set +e
          "${BIN}" -artifact_prefix=fuzz/artifacts/fs_ops/ fuzz/corpus/fs_ops -rss_limit_mb=1024 -max_total_time=180 -max_len=1024 -print_final_stats=1
          status=$?
          set -e

          # libFuzzer exits with code 71 when hitting the RSS cap.
          if [ "${status}" -eq 71 ]; then
            echo "Stopped at RSS limit (expected)."
            exit 0
          fi

          exit "${status}"

      - name: Cleanup slayerfs fuzz outputs (always)
        if: always()
        run: |
          cd project/slayerfs
          rm -rf fuzz/artifacts/fs_ops/*
          rm -rf fuzz/.tmp*

  xfstests:
    if: false
    name: xfstests (${{ matrix.backend }})
    runs-on: [self-hosted]
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: redis
            script: compose-xfstests/run_redis_xfstests.sh
          - backend: etcd
            script: compose-xfstests/run_etcd_xfstests.sh
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: stable
      SLAYERFS_XFSTESTS_ARTIFACT_ROOT: project/slayerfs/docker/compose-xfstests/artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: project

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git-lfs \
            fuse3 \
            libfuse3-dev \
            pkg-config \
            libssl-dev \
            sqlite3 \
            protobuf-compiler
          protoc --version

      - name: Fetch LFS assets for xfstests
        env:
          LFS_ASSETS: project/slayerfs/tests/scripts/xfstests-prebuilt/*.tar.gz,project/slayerfs/tests/scripts/fuse3-bundle/fusermount3
        run: |
          git lfs install --local
          git lfs pull --include="$LFS_ASSETS"

      - name: Run xfstests via docker-compose (${{ matrix.backend }})
        working-directory: project/slayerfs/docker
        run: |
          bash "${{ matrix.script }}"

      - name: Display xfstests results
        if: always()
        run: |
          ARTIFACT_ROOT="$SLAYERFS_XFSTESTS_ARTIFACT_ROOT"
          append_summary_block() {
            local title="$1"
            local file_path="$2"
            if [[ ! -f "$file_path" ]]; then
              return
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### $title" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 300 "$file_path" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          }

          echo "## xfstests results (${{ matrix.backend }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          LATEST=$(find "$ARTIFACT_ROOT" -maxdepth 1 -mindepth 1 -type d -name 'run-*' 2>/dev/null | sort -r | head -1)
          if [[ -z "$LATEST" ]]; then
            echo "No artifact directory found under $ARTIFACT_ROOT" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Artifact directory: $LATEST" >> "$GITHUB_STEP_SUMMARY"
          echo "LATEST_XFSTESTS_ARTIFACT=$LATEST" >> "$GITHUB_ENV"

          echo "::group::xfstests artifact dump (${{ matrix.backend }})"
          for file_path in \
            "$LATEST/xfstests-script.log" \
            "$LATEST/slayerfs.log" \
            "$LATEST/local.config" \
            "$LATEST/results/check.log" \
            "$LATEST/results/check.out"; do
            if [[ -f "$file_path" ]]; then
              echo "=== ${file_path#$LATEST/} ==="
              cat "$file_path"
              echo
            fi
          done

          while IFS= read -r bad_file; do
            [[ -n "$bad_file" ]] || continue
            echo "=== ${bad_file#$LATEST/} ==="
            cat "$bad_file"
            echo
          done < <(find "$LATEST/results" -name '*.out.bad' 2>/dev/null | sort)
          echo "::endgroup::"

          CHECK_OUT="$LATEST/results/check.out"
          if [[ -f "$CHECK_OUT" ]]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$CHECK_OUT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No check.out found at $CHECK_OUT" >> "$GITHUB_STEP_SUMMARY"
          fi

          BAD_COUNT=$(find "$LATEST/results" -name '*.out.bad' 2>/dev/null | wc -l)
          if [[ "$BAD_COUNT" -gt 0 ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failed tests ($BAD_COUNT)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            find "$LATEST/results" -name '*.out.bad' -exec basename {} .out.bad \; | sort >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          append_summary_block "xfstests script log tail" "$LATEST/xfstests-script.log"
          append_summary_block "slayerfs log tail" "$LATEST/slayerfs.log"
          append_summary_block "xfstests check.log tail" "$LATEST/results/check.log"

      - name: Upload xfstests artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slayerfs-xfstests-${{ matrix.backend }}-logs
          path: ${{ env.LATEST_XFSTESTS_ARTIFACT }}
          if-no-files-found: ignore

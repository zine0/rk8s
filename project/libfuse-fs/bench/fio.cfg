; fio jobfile for libfuse-fs macOS performance baseline.
; Three jobs run sequentially via stonewall:
;   1. 4k random read
;   2. 1M sequential read
;   3. metadata-only stat workload (open/stat/close)
;
; Override the test directory with FIO_DIRECTORY env var; default is set by
; the wrapper script to <mountpoint>/bench-data.

[global]
ioengine=posixaio
direct=0
buffered=1
group_reporting=1
runtime=30
time_based=1
ramp_time=2
filename_format=$jobname.$jobnum.dat

[randread-4k]
rw=randread
bs=4k
size=512m
numjobs=4
iodepth=16
stonewall

[seqread-1m]
rw=read
bs=1m
size=1g
numjobs=2
iodepth=4
stonewall

[meta-stat]
ioengine=filestat
nrfiles=1000
filesize=4k
runtime=20
time_based=1
numjobs=2
stonewall

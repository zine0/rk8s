name: rkforge CI

on:
  pull_request:
    paths:
      - "project/rkforge/**"
      - "project/common/**"
      - "project/libruntime/**"
      - "project/libcontainer/**"
      - "project/libcni/**"
      - "project/Cargo.toml"
      - "project/Cargo.lock"
      - ".github/workflows/rkforge_container_lifecycle_test.yml"
  # Just run on pull requests as the main branch is protected and requires CI to pass before merging.
  # This avoids redundant runs on pushes to main.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-and-integration:
    name: Unit and Fast Integration Tests
    runs-on: rk8s-runner-set
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v6
      - run: |
          cd project
          cargo build --release -p aardvark-dns
          sudo mv target/release/aardvark-dns /usr/bin/
      - run: |
          cd project
          cargo test -p rkforge --lib
      - run: |
          cd project
          cargo test -p rkforge --test test_image_cmd

  qlean-lifecycle:
    name: Qlean Container Lifecycle Test
    runs-on: [self-hosted]
    timeout-minutes: 45
    env:
      RUSTUP_TOOLCHAIN: stable
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v6
      # Set up qlean prerequisites is unnecessary here as the self-hosted runner is already configured with the necessary dependencies and permissions to run qlean tests.
      # If the runner environment changes in the future, don't forget to add a step to check for qlean prerequisites and set up the environment accordingly.
      - run: |
          cd project
          RUST_LOG=qlean=info cargo test -p rkforge --test test_container_lifecycle_qlean -- --nocapture
